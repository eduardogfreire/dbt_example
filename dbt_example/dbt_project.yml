name: 'dbt_example'
version: '1.0.0'
config-version: 2

profile: 'dbt_example'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_example:
    staging:
      schema: staging
      +materialized: table
      tags: ["staging"]

    intermediate:
      +materialized: ephemeral
      tags: ['staging']

    marts:
      schema: marts
      +materialized: table 
      tags: ['marts']
seeds:
  dbt_example:
    +schema: seeds
    tags: ['seeds']